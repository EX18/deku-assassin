<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>SYSTEM — INITIALIZING</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cyan: #00d4ff;
  --cyan2: #4de8ff;
  --blue: #1a6fff;
  --gold: #f0b429;
  --red: #ff2d2d;
  --green: #00ff88;
  --white: #e8f4ff;
  --muted: #3a5a7a;
  --muted2: #5a7a9a;
  --mono: 'Share Tech Mono', monospace;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 20px);
}

html, body {
  height: 100%; width: 100%;
  background: #000;
  color: var(--cyan);
  font-family: var(--mono);
  overflow: hidden;
  user-select: none;
}

/* Grid background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 36px 36px;
  animation: gridpulse 4s ease-in-out infinite;
}
@keyframes gridpulse {
  0%,100% { opacity:0.5 }
  50% { opacity:1 }
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px
  );
}

canvas {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
}

/* ── SCREENS ── */
#app {
  position: fixed; inset: 0; z-index: 10;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
}

.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s ease;
}
.screen.active { opacity: 1; pointer-events: all; }
.screen.fade-out { opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }

/* ══════════════════════════════
   SCREEN 1 — BOOT
══════════════════════════════ */
#boot {
  justify-content: flex-end;
  padding-bottom: calc(var(--safe-bot) + 40px);
}

.boot-logo {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  text-align: center;
}
.boot-rank {
  font-size: 120px; font-weight: 700; line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1px rgba(0,212,255,0.2);
  animation: rank-reveal 1.5s ease forwards;
  animation-delay: 0.5s;
}
@keyframes rank-reveal {
  0%   { -webkit-text-stroke-color: rgba(0,212,255,0); color: transparent; }
  50%  { -webkit-text-stroke-color: rgba(0,212,255,0.6); color: transparent; }
  100% { -webkit-text-stroke-color: rgba(0,212,255,0); color: rgba(0,212,255,0.08); }
}
.boot-title {
  font-size: 11px; letter-spacing: 0.35em; color: var(--muted2);
  margin-top: 8px; opacity: 0;
  animation: fadein 0.5s ease forwards;
  animation-delay: 1.2s;
}
@keyframes fadein { to { opacity: 1; } }

.boot-bar-wrap {
  width: 100%; max-width: 280px;
  margin-bottom: 16px; opacity: 0;
  animation: fadein 0.4s ease forwards;
  animation-delay: 1.6s;
}
.boot-bar-label {
  font-size: 9px; letter-spacing: 0.2em; color: var(--muted);
  margin-bottom: 6px;
}
.boot-bar-track {
  height: 2px; background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.15);
  overflow: hidden;
}
.boot-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  box-shadow: 0 0 8px var(--cyan);
  animation: fill-bar 2.5s ease forwards;
  animation-delay: 1.8s;
}
@keyframes fill-bar { to { width: 100%; } }

.boot-status {
  font-size: 10px; color: var(--muted2); letter-spacing: 0.1em;
  margin-top: 6px; height: 14px;
  overflow: hidden;
}

/* ══════════════════════════════
   SCREEN 2 — TERMINAL
══════════════════════════════ */
#terminal {
  justify-content: flex-start;
  padding-top: calc(var(--safe-top) + 20px);
  align-items: flex-start;
}

.term-lines {
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 0;
}

.term-line {
  font-size: 13px; line-height: 1.8;
  min-height: 1.8em;
  white-space: pre-wrap; word-break: break-word;
}
.term-line.system  { color: var(--cyan); }
.term-line.warning { color: var(--gold); }
.term-line.alert   { color: var(--red); }
.term-line.success { color: var(--green); }
.term-line.muted   { color: var(--muted2); }
.term-line.blank   { min-height: 0.9em; }
.term-line.big {
  font-size: 15px; color: var(--white);
  letter-spacing: 0.05em; font-weight: 700;
}

.cursor {
  display: inline-block; width: 8px; height: 14px;
  background: var(--cyan); vertical-align: text-bottom;
  animation: cur 0.8s infinite;
  box-shadow: 0 0 6px var(--cyan);
}
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

/* ══════════════════════════════
   SCREEN 3 — NAME INPUT
══════════════════════════════ */
#namescreen {
  justify-content: center;
  gap: 0;
}

.name-panel {
  width: 100%; max-width: 340px;
  border: 1px solid rgba(0,212,255,0.3);
  background: rgba(0,5,20,0.9);
  position: relative; overflow: hidden;
}
.date-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}
.date-panel::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
}

/* corner brackets */
.date-panel .corner { position: absolute; width: 10px; height: 10px; }
.date-panel .corner.tl { top:-1px; left:-1px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
.date-panel .corner.tr { top:-1px; right:-1px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
.date-panel .corner.bl { bottom:-1px; left:-1px; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }
.date-panel .corner.br { bottom:-1px; right:-1px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }

.dp-header {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(0,212,255,0.1);
  display: flex; align-items: center; justify-content: space-between;
}
.dp-title { font-size: 10px; letter-spacing: 0.25em; color: var(--cyan); }
.dp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.dp-body { padding: 20px 16px; }

.dp-question {
  font-size: 11px; color: var(--muted2); letter-spacing: 0.1em;
  margin-bottom: 6px; line-height: 1.6;
}
.dp-question span { color: var(--white); }

.dp-name-row {
  display: flex; align-items: center; gap: 8px;
  border: 1px solid rgba(0,212,255,0.25);
  background: rgba(0,212,255,0.04);
  padding: 10px 12px; margin-bottom: 16px;
}
.dp-name-label { font-size: 10px; color: var(--muted2); white-space: nowrap; }
.dp-name-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 13px; color: var(--white);
  caret-color: var(--cyan);
}
.dp-name-input::placeholder { color: var(--muted); }

.dp-date-label {
  font-size: 10px; color: var(--muted2); letter-spacing: 0.15em; margin-bottom: 8px;
}

/* Date selector — 3 scroll wheels */
.dp-wheels {
  display: flex; gap: 6px; margin-bottom: 20px;
  justify-content: center;
}
.wheel-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.wheel-label { font-size: 8px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 4px; }

.wheel {
  width: 72px; height: 120px;
  overflow: hidden; position: relative;
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,0,0,0.4);
}
.wheel::before, .wheel::after {
  content: ''; position: absolute; left: 0; right: 0; z-index: 2;
  height: 36px; pointer-events: none;
}
.wheel::before { top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
.wheel::after  { bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }

.wheel-center-line {
  position: absolute; top: 50%; left: 0; right: 0; z-index: 1;
  height: 36px; transform: translateY(-50%);
  border-top: 1px solid rgba(0,212,255,0.3);
  border-bottom: 1px solid rgba(0,212,255,0.3);
  background: rgba(0,212,255,0.05);
  pointer-events: none;
}

.wheel-inner {
  display: flex; flex-direction: column;
  transition: transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
  cursor: grab;
}
.wheel-inner:active { cursor: grabbing; }

.wheel-item {
  height: 36px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--muted2); flex-shrink: 0;
  transition: color 0.2s, font-size 0.2s;
}
.wheel-item.selected { color: var(--cyan); font-size: 16px; }

/* Selected date display */
.dp-selected-date {
  font-size: 12px; color: var(--cyan); text-align: center;
  letter-spacing: 0.1em; margin-bottom: 6px; min-height: 18px;
}
.dp-week-label {
  font-size: 10px; color: var(--muted2); text-align: center;
  margin-bottom: 16px; min-height: 14px;
}

/* Confirm button */
.dp-confirm {
  width: 100%;
  border: 1px solid var(--cyan);
  background: rgba(0,212,255,0.1);
  color: var(--cyan2); font-family: var(--mono);
  font-size: 11px; letter-spacing: 0.2em;
  padding: 14px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.2s;
}
.dp-confirm::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
  transition: left 0.5s;
}
.dp-confirm:active::before { left: 100%; }
.dp-confirm:active { background: rgba(0,212,255,0.2); transform: scale(0.99); }
.dp-confirm:disabled { opacity: 0.3; cursor: default; }

/* ══════════════════════════════
   SCREEN 4 — AWAKENING
══════════════════════════════ */
#awakening {
  text-align: center;
  gap: 0;
}

.aw-rank {
  font-size: 100px; font-weight: 700; color: var(--muted2);
  line-height: 1; margin-bottom: 12px;
  animation: aw-rank 2s ease forwards;
}
@keyframes aw-rank {
  0%   { color: var(--muted2); text-shadow: none; }
  40%  { color: var(--cyan); text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,212,255,0.4); }
  70%  { color: var(--white); text-shadow: 0 0 60px var(--cyan), 0 0 120px rgba(0,212,255,0.3); }
  100% { color: var(--cyan2); text-shadow: 0 0 20px var(--cyan); }
}

.aw-system { font-size: 9px; letter-spacing: 0.35em; color: var(--muted2); margin-bottom: 4px; }
.aw-title { font-size: 18px; letter-spacing: 0.15em; color: var(--white); margin-bottom: 6px; opacity: 0; animation: fadein 0.5s ease forwards; animation-delay: 1s; }
.aw-name  { font-size: 13px; letter-spacing: 0.1em; color: var(--cyan); margin-bottom: 24px; opacity: 0; animation: fadein 0.5s ease forwards; animation-delay: 1.3s; }

.aw-stats {
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,5,20,0.8);
  padding: 16px 24px; width: 100%; max-width: 280px;
  margin-bottom: 24px;
  opacity: 0; animation: fadein 0.5s ease forwards; animation-delay: 1.8s;
}
.aw-stat-row {
  display: flex; justify-content: space-between;
  padding: 5px 0; border-bottom: 1px solid rgba(0,212,255,0.07);
  font-size: 11px;
}
.aw-stat-row:last-child { border: none; }
.aw-stat-k { color: var(--muted2); }
.aw-stat-v { color: var(--white); }

.aw-enter {
  border: 1px solid var(--cyan); background: rgba(0,212,255,0.1);
  color: var(--cyan2); font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.2em; padding: 14px 32px; cursor: pointer;
  opacity: 0; animation: fadein 0.5s ease forwards; animation-delay: 2.5s;
  transition: all 0.2s;
}
.aw-enter:active { background: rgba(0,212,255,0.25); transform: scale(0.98); }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="app">

  <!-- SCREEN 1: BOOT -->
  <div class="screen active" id="boot">
    <div class="boot-logo">
      <div class="boot-rank">E</div>
      <div class="boot-title">ASSASSIN PROTOCOL SYSTEM</div>
    </div>
    <div class="boot-bar-wrap">
      <div class="boot-bar-label">INITIALIZING SYSTEM...</div>
      <div class="boot-bar-track">
        <div class="boot-bar-fill"></div>
      </div>
      <div class="boot-status" id="bootStatus"></div>
    </div>
  </div>

  <!-- SCREEN 2: TERMINAL -->
  <div class="screen" id="terminal">
    <div class="term-lines" id="termLines"></div>
  </div>

  <!-- SCREEN 3: NAME INPUT -->
  <div class="screen" id="namescreen">
    <div class="name-panel">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="dp-header">
        <div class="dp-title">HUNTER REGISTRATION</div>
        <div class="dp-dot"></div>
      </div>

      <div class="dp-body">
        <div class="dp-question">
          <span>Ingresá tu nombre, cazador.</span><br>
          Quedarás registrado en el sistema.
        </div>
        <div class="dp-name-row">
          <div class="dp-name-label">HUNTER ›</div>
          <input class="dp-name-input" id="nameInput" type="text" maxlength="20" placeholder="tu nombre..." autocomplete="off" autocorrect="off" spellcheck="false" onkeyup="updateConfirmBtn()" oninput="updateConfirmBtn()">
        </div>

        <button class="dp-confirm" id="confirmBtn" onclick="confirmName()" disabled>
          [ INICIAR PROTOCOLO ]
        </button>
      </div>
    </div>
  </div>

  <!-- SCREEN 4: AWAKENING -->
  <div class="screen" id="awakening">
    <div class="aw-system">◈ SYSTEM NOTIFICATION ◈</div>
    <div class="aw-rank" id="awRank">E</div>
    <div class="aw-title">AWAKENING DETECTED</div>
    <div class="aw-name" id="awName">HUNTER DEKU</div>
    <div class="aw-stats" id="awStats">
      <div class="aw-stat-row"><span class="aw-stat-k">Rank</span><span class="aw-stat-v">E — APRENDIZ</span></div>
      <div class="aw-stat-row"><span class="aw-stat-k">Inicio</span><span class="aw-stat-v" id="awDate">—</span></div>
      <div class="aw-stat-row"><span class="aw-stat-k">Duración</span><span class="aw-stat-v">12 SEMANAS</span></div>
      <div class="aw-stat-row"><span class="aw-stat-k">Objetivo</span><span class="aw-stat-v">FÍSICO ATLÉTICO</span></div>
      <div class="aw-stat-row"><span class="aw-stat-k">XP</span><span class="aw-stat-v">0 / 100</span></div>
    </div>
    <button class="aw-enter" onclick="enterSystem()">[ ENTER THE SYSTEM ]</button>
  </div>

</div>

<script>
// ══════════════════════════════════════
//  CHECK IF ALREADY ONBOARDED
// ══════════════════════════════════════
const OKEY = 'deku_onboarded';
const SKEY = 'deku_v3';

function alreadyOnboarded() {
  try { return !!localStorage.getItem(OKEY); } catch(e) { return false; }
}

// If already onboarded, skip straight to main app
if (alreadyOnboarded()) {
  window.location.replace('./index.html');
}

// ══════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════
function initParticles() {
  const c = document.getElementById('particles');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const pts = Array.from({length:25}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    sz: Math.random()*1.2+0.2,
    vy: -(Math.random()*0.3+0.06), vx: (Math.random()-0.5)*0.12,
    a: Math.random()*0.18+0.04,
    col: Math.random()>0.6?'#00d4ff':Math.random()>0.5?'#1a6fff':'#c8960c'
  }));
  (function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle = p.col; ctx.globalAlpha = p.a; ctx.fill();
      p.y += p.vy; p.x += p.vx;
      if (p.y < 0) { p.y = c.height; p.x = Math.random()*c.width; }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  })();
}
initParticles();

// ══════════════════════════════════════
//  SCREEN TRANSITIONS
// ══════════════════════════════════════
function showScreen(id, delay=0) {
  setTimeout(() => {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }, delay);
}

function hideScreen(id) {
  const el = document.getElementById(id);
  el.classList.add('fade-out');
  setTimeout(() => el.classList.remove('active','fade-out'), 400);
}

// ══════════════════════════════════════
//  🔊 SOUND ENGINE
// ══════════════════════════════════════
const SFX = (() => {
  let ctx = null, master = null, enabled = true;
  function getCtx() {
    if (!ctx) { ctx = new (window.AudioContext||window.webkitAudioContext)(); master = ctx.createGain(); master.gain.value = 0.7; master.connect(ctx.destination); }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function osc(type, freq, t, dur, vol, dest) {
    const c=getCtx(), o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(dest||master); o.start(t); o.stop(t+dur+0.01);
  }
  function slide(type, f1, f2, t, dur, vol, dest) {
    const c=getCtx(), o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.setValueAtTime(f1,t); o.frequency.linearRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(dest||master); o.start(t); o.stop(t+dur+0.01);
  }
  function noise(t, dur, vol, fc) {
    const c=getCtx(), buf=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource(), flt=c.createBiquadFilter(), g=c.createGain();
    flt.type='bandpass'; flt.frequency.value=fc||1000; flt.Q.value=0.5;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(master); src.start(t); src.stop(t+dur);
  }
  function mkReverb(wet) {
    const c=getCtx(), cv=c.createConvolver(), len=c.sampleRate*1.5, buf=c.createBuffer(2,len,c.sampleRate);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);}
    cv.buffer=buf; const g=c.createGain(); g.gain.value=wet; cv.connect(g); g.connect(master); return cv;
  }

  const sfx = {
    keyclick() { if(!enabled)return; const c=getCtx(),t=c.currentTime; noise(t,0.035,0.1,3000+Math.random()*1500); osc('square',700+Math.random()*300,t,0.03,0.04); },

    systemBoot() { if(!enabled)return; const c=getCtx(),t=c.currentTime,rv=mkReverb(0.3);
      slide('sawtooth',40,80,t,2.5,0.12,rv); slide('sine',80,160,t+0.5,2.0,0.08,rv);
      [0.8,1.2,1.5,1.7,1.85].forEach((dt,i)=>osc('square',440+i*110,t+dt,0.12,0.07));
      [220,330,440,550].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+2.0);g.gain.linearRampToValueAtTime(0.05,t+2.4);g.gain.exponentialRampToValueAtTime(0.0001,t+3.5);o.connect(g);g.connect(rv);o.start(t+2.0);o.stop(t+3.6);}); },

    termLine() { if(!enabled)return; const c=getCtx(),t=c.currentTime; slide('square',280,560,t,0.06,0.05); osc('sine',1100,t+0.04,0.05,0.03); },

  { text: '',                                    cls: 'blank',   delay: 0   },
  { text: '> SYSTEM ALERT',                      cls: 'warning', delay: 0   },

  { text: 'But you can choose when to begin.',   cls: 'success', delay: 0   },
  { text: '',                                    cls: 'blank',   delay: 600 },
];

const CHAR_SPEED = 28; // ms per character

function runTerminal() {
  showScreen('terminal');
  const container = document.getElementById('termLines');
  container.innerHTML = '';

  let lineIdx = 0;
  let extraDelay = 0;

  function nextLine() {
    if (lineIdx >= LINES.length) {
      // All lines done — transition to name screen
      setTimeout(() => { SFX.transition(); hideScreen('terminal'); showScreen('namescreen', 300); }, 800);
      return;
    }

    const line = LINES[lineIdx++];
    extraDelay += line.delay;

    const div = document.createElement('div');
    div.className = `term-line ${line.cls}`;
    container.appendChild(div);

    // Scroll to bottom
    container.scrollTop = container.scrollHeight;

    if (!line.text) {
      // Blank line — add delay and move on
      setTimeout(nextLine, extraDelay + 80);
      extraDelay = 0;
      return;
    }

    // Typewrite the text
    let charIdx = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    div.appendChild(cursor);

    const totalTime = extraDelay + line.text.length * CHAR_SPEED;

    function typeChar() {
      if (charIdx >= line.text.length) {
        cursor.remove();
        SFX.termLine();
        const gap = 60;
        setTimeout(nextLine, gap);
        extraDelay = 0;
        return;
      }
      div.textContent = line.text.slice(0, ++charIdx);
      div.appendChild(cursor);
      container.scrollTop = container.scrollHeight;
      SFX.keyclick();
      setTimeout(typeChar, CHAR_SPEED + (Math.random() * 10 - 5));
    }

    setTimeout(typeChar, extraDelay);
    extraDelay = 0;
  }

  setTimeout(nextLine, 200);
}
